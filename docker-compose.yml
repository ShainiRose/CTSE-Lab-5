version: '3.8'

services:
  item-service:
    build:
      context: ./itemservice
      dockerfile: docker.yml
    container_name: item-service
    ports:
      - "8081:8081"
    networks:
      - microservices-net

  order-service:
    build:
      context: ./orderservice
      dockerfile: docker.yml
    container_name: order-service
    ports:
      - "8082:8082"
    networks:
      - microservices-net

  payment-service:
    build:
      context: ./paymentservice
      dockerfile: docker.yml
    container_name: payment-service
    ports:
      - "8083:8083"
    networks:
      - microservices-net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: docker.yml
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - item-service
      - order-service
      - payment-service
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge